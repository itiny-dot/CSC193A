<!doctype html>
<html>
  <head>
    <title>Fancify Shamcify</title>

    <!-- link to your script file here -->
    <script src="fancifymytext.js"></script>
  </head>

  <body>
    <h1>Fancify my Text</h1>

    <!-- Your UI controls go here -->
    <form>
      <fieldset>
        <legend>Text</legend>
        <textarea id="textArea" name ="userText" rows="4" cols="30"></textarea>
      </fieldset>

      <fieldset>
        <legend>Fancify</legend>
        <button type="button" onclick="makeTextBigger()">Bigger!</button>
        <button type="button" onclick="mooText()">Moo</button>
        <br /><br />

        <label>
          <input 
            type="radio" 
            id="fancyRadio"
            name="style" 
            value="fancy"
            onchange="fancifyText()" 
            />
          FancyShmancy
        </label>

        <label>
          <input 
          type="radio" 
          id="boringRadio"
          name="style" 
          value="boring" 
          onchange="fancifyText()"/>
          BoringBetty
        </label>
      </fieldset>
    </form>
  </body>
</html>
